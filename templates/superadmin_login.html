<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin — AttendAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0f; --panel: #12121a; --border: #1e1e2e; --accent: #f59e0b; --accent2: #dc2626; --text: #e2e8f0; --muted: #64748b; --error: #ff4757; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; }
  .orb-1 { width: 400px; height: 400px; background: #dc2626; top: -100px; left: -100px; animation: float1 8s ease-in-out infinite; }
  .orb-2 { width: 300px; height: 300px; background: #f59e0b; bottom: -50px; right: -50px; animation: float2 10s ease-in-out infinite; }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }

  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .logo-area { text-align: center; margin-bottom: 36px; }
  .logo-icon { width: 68px; height: 68px; background: linear-gradient(135deg, #dc2626, #f59e0b); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 40px rgba(245,158,11,0.25); }
  .logo-icon svg { width: 34px; height: 34px; color: white; }
  .logo-area h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg,#fff 40%,#f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-area p { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 36px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #dc2626, #f59e0b, #dc2626); }
  .card h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .card .sub { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 28px; letter-spacing: 1px; }

  .sa-badge { display: flex; align-items: center; gap: 8px; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); border-radius: 10px; padding: 10px 14px; margin-bottom: 24px; font-family: 'Space Mono', monospace; font-size: 11px; color: #f59e0b; }
  .sa-badge svg { width: 14px; height: 14px; flex-shrink: 0; }

  .flash { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); border-radius: 10px; padding: 12px 16px; color: var(--error); font-size: 13px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

  .field { margin-bottom: 20px; }
  label { display: block; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .input-wrap { position: relative; }
  .input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); pointer-events: none; }
  input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px 13px 42px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  input:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); background: rgba(245,158,11,0.04); }
  input::placeholder { color: var(--muted); opacity: 0.6; }

  .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #dc2626, #f59e0b); border: none; border-radius: 10px; color: white; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; box-shadow: 0 8px 30px rgba(245,158,11,0.2); }
  .btn-login:hover { opacity: 0.9; }

  .back-link { text-align: center; margin-top: 20px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .back-link a { color: var(--accent); text-decoration: none; }
  .back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">
  <div class="logo-area">
    <div class="logo-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
      </svg>
    </div>
    <h1>AttendAI</h1>
    <p>Super Admin Portal</p>
  </div>

  <div class="card">
    <h2>Super Admin Access</h2>
    <p class="sub">// COMPANY-WIDE CONTROL</p>

    <div class="sa-badge">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
      Full company access — all departments & employees
    </div>

    {% if error %}
    <div class="flash">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      Invalid credentials. Access denied.
    </div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <input type="email" name="email" placeholder="superadmin@company.com" required autocomplete="email">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn-login">Access Super Admin →</button>
    </form>
  </div>

  <div class="back-link">
    Department admin? <a href="/admin">Login here →</a>
  </div>
</div>
</body>
</html>
